# Performance & Vim integration
set -sg escape-time 0                           # No delay for escape key press
set -g focus-events on                          # Send focus events to applications

# Start numbering at 1 (easier to reach on keyboard)
set -g base-index 1
setw -g pane-base-index 1

# Automatically renumber windows when one is closed
set -g renumber-windows on

# Increase scrollback buffer size
set -g history-limit 50000

# smart pane switching with awareness of vim splits
# Uses tmux's built-in format matching (no shell spawn, ~8ms vs ~40-163ms)
# Customized to use Meta key (Option on Mac) instead of Control
bind -n M-h if-shell -F '#{m:*vim*,#{pane_current_command}}' 'send-keys M-h' 'select-pane -L'
bind -n M-j if-shell -F '#{m:*vim*,#{pane_current_command}}' 'send-keys M-j' 'select-pane -D'
bind -n M-k if-shell -F '#{m:*vim*,#{pane_current_command}}' 'send-keys M-k' 'select-pane -U'
bind -n M-l if-shell -F '#{m:*vim*,#{pane_current_command}}' 'send-keys M-l' 'select-pane -R'

# Intuitive pane splitting
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Pane resizing with Meta+Shift+hjkl
bind -n M-H resize-pane -L 5
bind -n M-J resize-pane -D 5
bind -n M-K resize-pane -U 5
bind -n M-L resize-pane -R 5

# Use vi mode for copy mode
setw -g mode-keys vi

# Enable mouse support
set -g mouse on

# Pane styling - visible border only around active pane
set -g pane-border-style 'fg=#1e1e2e'           # Same as background (invisible)
set -g pane-active-border-style 'fg=#a6e3a1'    # Green border for active pane

# Copy to system clipboard with 'y' in copy mode
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"

# Status bar styling - Catppuccin Mocha
set -g status-style 'bg=#1e1e2e,fg=#cdd6f4'
set -g status-left '#[bg=#a6e3a1,fg=#1e1e2e,bold] #S #[bg=#1e1e2e] '
set -g status-right '#[fg=#89b4fa]%H:%M #[fg=#cdd6f4]| #[fg=#f9e2af]%Y-%m-%d '
set -g status-left-length 50
set -g window-status-format '#[fg=#7f849c] #I:#W '
set -g window-status-current-format '#[bg=#313244,fg=#a6e3a1,bold] #I:#W '
